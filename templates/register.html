<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedicalCare</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'register.css' %}">
</head>
<body>
    <form action="{% url 'reg' %}" method="post">
        {% csrf_token %}
        
        <fieldset >
          <legend>Register</legend>
          <div class="mb-3">
            <label for="disabledTextInput" class="form-label">Doctor name</label>
            <input type="text" name="doc_name" id="disabledTextInput" class="form-control" placeholder="Disabled input">
          </div>
          <div class="mb-3">
            <label for="disabledTextInput" class="form-label">Patient Name</label>
            <input type="text" name="p_name" id="disabledTextInput" class="form-control" placeholder="Disabled input">
          </div>
          <div class="mb-3">
            <label for="disabledTextInput" class="form-label">Age</label>
            <input type="number" name="p_age" id="disabledTextInput" class="form-control" placeholder="Disabled input">
          </div>
          <div class="mb-3">
            <label for="disabledTextInput" class="form-label">Date</label>
            <input type="datetime-local" name="p_date" id="disabledTextInput" class="form-control" placeholder="Disabled input">
          </div>
          <div class="mb-3">
            <label for="disabledSelect" class="form-label">Gender</label>
            <select name="gender" id="disabledSelect" class="form-select">
              <option disabled selected hidden class>Select</option>
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="disabledTextInput" class="form-label">Contact</label>
            <input type="number" name="contact"  id="disabledTextInput" class="form-control" placeholder="Disabled input">
          </div><div class="mb-3">
            <label for="disabledTextInput" class="form-label">Problem</label>
            <input type="text" name="problem" id="disabledTextInput" class="form-control" placeholder="Disabled input">
          </div>
          <div class="mb-3">
            <div class="form-check">
              <input class="form-check-input" required type="checkbox" id="disabledFieldsetCheck" >
              <label class="form-check-label" for="disabledFieldsetCheck">
                Can't check this
              </label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Submit</button>
        </fieldset>
      </form>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    
</body>
</html>
