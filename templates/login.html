{% extends 'base.html' %}
{% load static %}

{% block title %}MedicalCare - Login{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row align-items-center">
        <div class="col-lg-6 d-none d-lg-block">
            <img src="{% static 'login.jpg' %}" class="img-fluid" alt="Login illustration">
        </div>
        <div class="col-lg-6">
            <form class="card p-4 shadow-lg" method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <h2 class="mb-1 fw-bold text-primary">Login</h2>
                <hr>

                {% if messages %}
                    {% for msg in messages %}
                        <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
                            {{ msg }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Email address</label>
                    <input type="email" name="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" required class="form-check-input" id="agreeCheck">
                    <label class="form-check-label" for="agreeCheck">I agree to the terms</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                <p class="text-center mt-3 mb-0">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
