{% extends 'base.html' %}

{% block title %}MedicalCare - Booking Confirmed{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="card shadow-lg d-inline-block px-5 py-5" style="border-radius: 16px;">
        <div style="border-radius: 50%; height: 120px; width: 120px; background: #F8FAF5; margin: 0 auto 20px;"
             class="d-flex align-items-center justify-content-center">
            <span style="font-size: 60px; color: #9ABC66;">✓</span>
        </div>
        <h1 class="fw-bold" style="color: #88B04B;">Booking Confirmed!</h1>
        <p class="text-muted fs-5 mt-2">We received your appointment request.<br>We'll be contacting you shortly!</p>
        <div class="d-flex gap-3 justify-content-center mt-4">
            <a href="{% url 'home' %}" class="btn btn-primary px-4">View More Doctors</a>
            <a href="{% url 'appointments' %}" class="btn btn-outline-primary px-4">My Appointments</a>
        </div>
    </div>
</div>
{% endblock %}
